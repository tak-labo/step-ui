services:
  step-ca:
    image: smallstep/step-ca:latest
    container_name: step-ca
    ports:
      - "9000:9000"
    volumes:
      - step-data:/home/step
    environment:
      - DOCKER_STEPCA_INIT_NAME=Step CA
      - DOCKER_STEPCA_INIT_DNS_NAMES=step-ca,localhost
      - DOCKER_STEPCA_INIT_PROVISIONER_NAME=admin
      - DOCKER_STEPCA_INIT_PASSWORD_FILE=/home/step/password
    entrypoint: >
      sh -c "
        mkdir -p /home/step &&
        echo 'StepCAPassword123!' > /home/step/password &&
        /usr/local/bin/docker-entrypoint.sh /home/step/config/ca.json
      "
    networks:
      - step-network

  step-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: step-ui
    ports:
      - "3000:3000"
    depends_on:
      - step-ca
    env_file:
      - .env
    networks:
      - step-network

volumes:
  step-data:

networks:
  step-network:
    driver: bridge

services:
  step-ca:
    image: smallstep/step-ca:0.27.4
    container_name: step-ca
    ports:
      - "9000:9000"
    volumes:
      - step-data:/home/step
    environment:
      - STEPCA_PASSWORD
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        mkdir -p /home/step/config
        echo "$${STEPCA_PASSWORD:-StepCAPassword123!}" > /home/step/password
        chmod 600 /home/step/password
        if [ ! -f /home/step/config/ca.json ]; then
          step ca init \
            --name "Step CA" \
            --dns "step-ca,localhost" \
            --address ":9000" \
            --provisioner "admin" \
            --password-file /home/step/password
          # authority.claims をグローバルに設定して最大証明書有効期間を10年に拡張する。
          # step ca init はプロビジョナーの claims を ca.json に書き出さないため
          # authority 直下に挿入することで全プロビジョナーのデフォルト上限を設定する。
          # enableAdmin は設定しない（DB管理になると ca.json 直接編集が無効になる）。
          sed -i 's/"authority": {/"authority": {\n\t\t"claims": {"minTLSCertDuration": "5m", "maxTLSCertDuration": "87600h", "defaultTLSCertDuration": "24h"},/' /home/step/config/ca.json
        fi
        exec step-ca /home/step/config/ca.json --password-file /home/step/password
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O- https://localhost:9000/health || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - step-network

  step-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: step-ui
    ports:
      - "3000:3000"
    depends_on:
      step-ca:
        condition: service_healthy
    volumes:
      - step-data:/home/step
      - cert-store:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CA_URL=${CA_URL}
      - CA_FINGERPRINT=${CA_FINGERPRINT}
      - CA_PROVISIONER=${CA_PROVISIONER}
      - CA_PROVISIONER_PASSWORD=${CA_PROVISIONER_PASSWORD}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_TRUST_HOST=true
      - UI_USERNAME=${UI_USERNAME}
      - UI_PASSWORD_HASH=${UI_PASSWORD_HASH}
      - NEXT_PUBLIC_CA_URL=${NEXT_PUBLIC_CA_URL}
      - NODE_EXTRA_CA_CERTS=/home/step/certs/root_ca.crt
    networks:
      - step-network

volumes:
  step-data:
  cert-store:

networks:
  step-network:
    driver: bridge

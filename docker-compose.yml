services:
  step-ca:
    image: smallstep/step-ca:0.27.4
    container_name: step-ca
    ports:
      - "9000:9000"
    volumes:
      - step-data:/home/step
    environment:
      - DOCKER_STEPCA_INIT_NAME=Step CA
      - DOCKER_STEPCA_INIT_DNS_NAMES=step-ca,localhost
      - DOCKER_STEPCA_INIT_PROVISIONER_NAME=admin
      - DOCKER_STEPCA_INIT_PASSWORD_FILE=/home/step/password
      - STEPCA_PASSWORD
    entrypoint: >
      sh -c "
        mkdir -p /home/step &&
        echo \"$${STEPCA_PASSWORD:-StepCAPassword123!}\" > /home/step/password &&
        chmod 600 /home/step/password &&
        /usr/local/bin/docker-entrypoint.sh /home/step/config/ca.json
      "
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O- https://localhost:9000/health || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - step-network

  step-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: step-ui
    ports:
      - "3000:3000"
    depends_on:
      step-ca:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - step-network

volumes:
  step-data:

networks:
  step-network:
    driver: bridge

services:
  step-ca:
    image: smallstep/step-ca:latest
    container_name: step-ca
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - step-data:/home/step
    environment:
      - DOCKER_STEPCA_INIT_NAME=Step CA
      - DOCKER_STEPCA_INIT_DNS_NAMES=step-ca,localhost
      - DOCKER_STEPCA_INIT_PROVISIONER_NAME=admin
      - DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT=true
      - DOCKER_STEPCA_INIT_PASSWORD=${DOCKER_STEPCA_INIT_PASSWORD:-StepCAPassword123!}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O- https://localhost:9000/health || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - step-network

  # admin provisioner の claims を更新する one-shot ジョブ
  step-ca-bootstrap:
    image: smallstep/step-ca:latest
    depends_on:
      step-ca:
        condition: service_healthy
    environment:
      - DOCKER_STEPCA_INIT_PROVISIONER_NAME=admin
    volumes:
      - step-data:/home/step
      - ./docker/step-ca-bootstrap.sh:/usr/local/bin/step-ca-bootstrap.sh:ro
    command:
      - /bin/bash
      - /usr/local/bin/step-ca-bootstrap.sh
    restart: "no"
    networks:
      - step-network

  step-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: step-ui
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      step-ca:
        condition: service_healthy
      step-ca-bootstrap:
        condition: service_completed_successfully
    volumes:
      - step-data:/home/step
      - cert-store:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - AUTH_TRUST_HOST=true
      - CA_FINGERPRINT=${CA_FINGERPRINT}
      - CA_PROVISIONER=${CA_PROVISIONER}
      - CA_PROVISIONER_PASSWORD=${DOCKER_STEPCA_INIT_PASSWORD:-StepCAPassword123!}
      - CA_URL=${CA_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${PUBLIC_URL:-http://localhost:3000}
      - NEXT_PUBLIC_CA_URL=${PUBLIC_URL:-https://step-ca:9000}
      - NODE_EXTRA_CA_CERTS=/home/step/certs/root_ca.crt
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-}
      - PUBLIC_URL=${PUBLIC_URL:-}
      - UI_PASSWORD_HASH=${UI_PASSWORD_HASH}
      - UI_USERNAME=${UI_USERNAME}
    networks:
      - step-network

  # 本番公開用 reverse proxy
  caddy:
    image: caddy:2-alpine
    container_name: step-ui-caddy
    profiles:
      - proxy
    depends_on:
      step-ca:
        condition: service_healthy
      step-ca-bootstrap:
        condition: service_completed_successfully
      step-ui:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CADDY_ACME_PROVISIONER=${CADDY_ACME_PROVISIONER:-caddy}
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-localhost}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - step-data:/home/step:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - step-network

volumes:
  step-data:
  cert-store:
  caddy-data:
  caddy-config:

networks:
  step-network:
    driver: bridge
